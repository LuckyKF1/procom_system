{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-2 d-flex justify-content-center">
    <div class="card p-4 p-md-5 w-100" style="max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3" style="border-bottom: 2px solid #f4f7fe;">
            <h4 class="fw-bold mb-0" style="color: #2b3674;">
                <i class="bi bi-tools me-2" style="color: #4318ff;"></i> ເພີ່ມລາຍການເຄມ (Add Claim)
            </h4>
            <a href="{% url 'claim_list' %}" class="btn btn-sm d-flex align-items-center px-3 py-2" style="background-color: #f4f7fe; color: #2b3674; font-weight: 600; border-radius: 10px; transition: all 0.2s;">
                <i class="bi bi-arrow-left me-2"></i> ກັບຄືນ
            </a>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label class="fw-bold mb-2" style="color: #2b3674; font-size: 0.95rem;">ລູກຄ້າ (Customer) <span class="text-danger">*</span></label>
                    <select name="cus_id" class="form-select" required>
                        <option value="">-- ເລືອກລູກຄ້າ --</option>
                        {% for c in customers %}
                            <option value="{{ c.cus_id }}">{{ c.cus_name }} (ໂທ: {{ c.tel }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="fw-bold mb-2" style="color: #2b3674; font-size: 0.95rem;">ສິນຄ້າທີ່ເຄມ (Product) <span class="text-danger">*</span></label>
                    <select name="pro_id" class="form-select" required>
                        <option value="">-- ເລືອກສິນຄ້າ --</option>
                        {% for p in products %}
                            <option value="{{ p.pro_id }}">{{ p.pro_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="fw-bold mb-2" style="color: #2b3674; font-size: 0.95rem;">ອາການເບື້ອງຕົ້ນ (Issue Details) <span class="text-danger">*</span></label>
                <textarea name="detail" class="form-control" rows="4" placeholder="ລະບຸອາການທີ່ເພພັງ ເຊັ່ນ: ເປີດບໍ່ຕິດ, ໜ້າຈໍແຕກ, ສາຍສາກບໍ່ເຂົ້າ..." required></textarea>
            </div>

            <div class="mb-5">
                <label class="fw-bold mb-2" style="color: #2b3674; font-size: 0.95rem;">ສະຖານະເບື້ອງຕົ້ນ (Status)</label>
                <select name="status" class="form-select" required>
                    <option value="ລໍຖ້າກວດສອບ" selected>ລໍຖ້າກວດສອບ (Pending)</option>
                    <option value="ກຳລັງສ້ອມແປງ">ກຳລັງສ້ອມແປງ (Processing)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 d-flex justify-content-center align-items-center btn-hover-shadow" style="border-radius: 15px;">
                <i class="bi bi-save me-2"></i> ບັນທຶກການຮັບເຄມ
            </button>
        </form>
        
    </div>
</div>

<style>
    .btn-hover-shadow { transition: all 0.3s ease; }
    .btn-hover-shadow:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(67, 24, 255, 0.3);
    }
</style>
{% endblock %}
