{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-2 d-flex justify-content-center">
    <div class="card p-4 p-md-5 w-100" style="max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3" style="border-bottom: 2px solid #f4f7fe;">
            <h4 class="fw-bold mb-0" style="color: #2b3674;">
                <i class="bi bi-tools me-2" style="color: #4318ff;"></i> ເພີ່ມລາຍການເຄມ (Add Claim)
            </h4>
            <a href="{% url 'claim_list' %}" class="btn btn-sm d-flex align-items-center px-3 py-2" style="background-color: #f4f7fe; color: #2b3674; font-weight: 600; border-radius: 10px; transition: all 0.2s;">
                <i class="bi bi-arrow-left me-2"></i> ກັບຄືນ
            </a>
        </div>

<form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="fw-bold mb-2" style="color: #2b3674; font-size: 0.95rem;">ຄົ້ນຫາ ແລະ ເລືອກລາຍການສິນຄ້າຈາກບິນຂາຍ <span class="text-danger">*</span></label>
                <select name="sale_detail_id" class="form-select py-2" required style="background-color: #f4f7fe; border-radius: 12px; border: 1px solid #e2e8f0;">
                    <option value="">-- ເລືອກລາຍການທີ່ລູກຄ້າເອົາມາເຄມ --</option>
                    {% for sd in sale_details %}
                        <option value="{{ sd.pk }}">
                            {{ sd.pro.pro_name }} 
                            | ບິນ: {{ sd.sale.sale_id }} 
                            | ລູກຄ້າ: {% if sd.sale.cus %}{{ sd.sale.cus.cus_name }}{% else %}ລູກຄ້າທົ່ວໄປ{% endif %}
                            | ວັນທີ: {{ sd.sale.sale_date|date:"d/m/Y" }}
                        </option>
                    {% endfor %}
                </select>
                <div class="alert alert-info mt-3 p-2 border-0 shadow-sm" style="border-radius: 10px; background-color: rgba(67, 24, 255, 0.05);">
                    <small style="color: #4318ff;">
                        <i class="bi bi-info-circle-fill me-1"></i> 
                        <b>ຄຳແນະນຳ:</b> ລະບົບຈະສະແດງສະເພາະສິນຄ້າທີ່ເຄີຍມີປະຫວັດການຂາຍເທົ່ານັ້ນ ເພື່ອປ້ອງກັນການເຄມສິນຄ້າທີ່ບໍ່ໄດ້ຊື້ຈາກຮ້ານ.
                    </small>
                </div>
            </div>

            <div class="mb-4">
                <label class="fw-bold mb-2" style="color: #2b3674; font-size: 0.95rem;">ອາການເພພັງ (Symptom) <span class="text-danger">*</span></label>
                <textarea name="symptom" class="form-control" rows="4" placeholder="ລະບຸອາການ ເຊັ່ນ: ເປີດບໍ່ຕິດ, ປຸ່ມກົດບໍ່ໄດ້..." required style="border-radius: 12px;"></textarea>
            </div>

            <div class="mb-5">
                <label class="fw-bold mb-2" style="color: #2b3674; font-size: 0.95rem;">ສະຖານະເບື້ອງຕົ້ນ</label>
                <select name="status" class="form-select py-2" style="background-color: #f4f7fe; border-radius: 12px;">
                    <option value="Processing" selected>ກຳລັງກວດສອບ (Processing)</option>
                    <option value="Waiting">ລໍຖ້າອາໄຫຼ່ (Waiting)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm" style="border-radius: 15px;">
                <i class="bi bi-save me-2"></i> ຢືນຢັນການຮັບເຄມ
            </button>
        </form>
        
    </div>
</div>

<style>
    .btn-hover-shadow { transition: all 0.3s ease; }
    .btn-hover-shadow:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(67, 24, 255, 0.3);
    }
</style>
{% endblock %}
