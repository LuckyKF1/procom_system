{% extends 'store/base.html' %}

{% block content %}
<div class="container-fluid">
    <h2 class="fw-bold mb-4"><i class="bi bi-grid-1x2-fill me-2"></i> ພາບລວມລະບົບ</h2>
    
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card bg-primary text-white p-3 h-100 shadow">
                <div class="d-flex align-items-center">
                    <div class="fs-1 me-3"><i class="bi bi-currency-dollar"></i></div>
                    <div>
                        <div class="small opacity-75">ຍອດຂາຍລວມ</div>
                        <h2 class="fw-bold mb-0">{{ total_sales|floatformat:0 }} <small class="fs-6">LAK</small></h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-success text-white p-3 h-100 shadow">
                <div class="d-flex align-items-center">
                    <div class="fs-1 me-3"><i class="bi bi-box-seam"></i></div>
                    <div>
                        <div class="small opacity-75">ສິນຄ້າໃນລະບົບ</div>
                        <h2 class="fw-bold mb-0">{{ total_products }} <small class="fs-6">ລາຍການ</small></h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-warning text-dark p-3 h-100 shadow">
                <div class="d-flex align-items-center">
                    <div class="fs-1 me-3"><i class="bi bi-tools"></i></div>
                    <div>
                        <div class="small opacity-75 text-dark">ສິນຄ້າລໍຖ້າເຄມ</div>
                        <h2 class="fw-bold mb-0">{{ total_claims }} <small class="fs-6">ລາຍການ</small></h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
