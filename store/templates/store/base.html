<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Procom POS{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* ຕັ້ງຄ່າ Font ໃຫ້ທັງເວັບໄຊທ໌ */
        body { 
            font-family: 'Noto Sans Lao', sans-serif; 
            background-color: #f0f2f5; 
            color: #1c1e21;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
        }

        /* ປັບແຕ່ງໃຫ້ປຸ່ມ ແລະ Card ເບິ່ງມົນໆ ມົນທັນສະໄໝ */
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn {
            border-radius: 10px;
            font-weight: 400;
        }

        /* ສ່ວນຂອງລາຍການໃນກະຕ່າ */
        .cart-items {
            scrollbar-width: thin;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-laptop me-2"></i>PROCOM POS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> ໜ້າຫຼັກ</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'pos' %}"><i class="bi bi-cart4"></i> ຂາຍສິນຄ້າ</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'product_list' %}"><i class="bi bi-box-seam"></i> ຄັງສິນຄ້າ</a></li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <i class="bi bi-person-circle me-2"></i> Admin
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
